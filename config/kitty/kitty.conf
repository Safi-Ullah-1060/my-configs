include no-clown-fiesta.conf

# ─── Font ─────────────────────────────────────────────────────────────────────
font_family      MesloLGSDZ Nerd Font
bold_font        MesloLGSDZ Nerd Font Bold
italic_font      MesloLGSDZ Nerd Font Italic
bold_italic_font MesloLGSDZ Nerd Font Bold Italic
font_size        18.0

# ─── Underline ────────────────────────────────────────────────────────────────
# pixels below baseline — increase to push lower
modify_font underline_position +5px
# % of font default — increase for thicker line
modify_font underline_thickness 200%

# ─── Cursor ───────────────────────────────────────────────────────────────────
cursor_shape          block
cursor_blink_interval 0.5

# ─── Scrollback ───────────────────────────────────────────────────────────────
scrollback_lines 10000

# ─── Performance ──────────────────────────────────────────────────────────────
# lower repaint_delay = more responsive redraws
repaint_delay   8
# lower input_delay = less latency between keypress and screen update
input_delay     1
sync_to_monitor yes

# ─── Bell ─────────────────────────────────────────────────────────────────────
enable_audio_bell yes

# ─── Window ───────────────────────────────────────────────────────────────────
window_padding_width 0
remember_window_size yes
initial_window_width  120c
initial_window_height 35c

# ─── Tab bar ──────────────────────────────────────────────────────────────────
tab_bar_style         powerline
tab_powerline_style   round
# hide tab bar when only one tab is open
tab_bar_min_tabs      2
tab_title_template    "{bell_symbol} {index}: {title.split('/')[-1]}"

# ─── Tabs ──────────────────────────────────────────────────────────────────
map ctrl+shift+t launch --cwd=current --type=tab

# ─── URLs ─────────────────────────────────────────────────────────────────────
url_style           single
open_url_with       default
detect_urls         yes

# ─── Clipboard ────────────────────────────────────────────────────────────────
# auto-copy selection to clipboard (like Konsole)
copy_on_select      yes

# ─── Mouse ────────────────────────────────────────────────────────────────────
# hide cursor after 2s of inactivity while typing
mouse_hide_wait     2.0

# ─── Shell ────────────────────────────────────────────────────────────────────
shell bash
shell_integration   enabled

