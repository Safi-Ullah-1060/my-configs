[opener]
edit = [
  { run = 'nvim "$@"', block = true, desc = "Neovim", for = "unix" },
  { run = 'code "$@"', desc = "Code", for = "unix" },
]
play = [
  { run = 'mpv %s', for = "unix" },
]
open = [
	{ run = 'kde-open "$1"', desc = "Open", for = "unix" },
  { run = 'nvim .', block = true, desc = "Neovim (PWD)" },
  { run = 'code .', block = true, desc = "Code (PWD)" },
]
dir = [
  { run = 'sh -c "cd \"$1\" && nvim " -- "" "%s"', desc = "Neovim", block = true, for = "unix" },
  { run = '"$0"code %s', desc = "Code", for = "unix" },
]
pdf = [
  { run = 'zathura %s', block = false, desc = "Zathura" }
]

[open]
prepend_rules = [
  { url = "*/", use = [ "dir", "open" ] },
  { url = "*.pdf", use = [ "pdf", "open" ]},
  { url = "*.drawio", use = "open" },
  { url = "*.sql", use = "open" },
  { mime = "{audio,video}/*", use = "play" },
  { mime = "text/*", use = "edit" },
]

[mgr]
ratio = [0, 2, 1]
sort_by = "natural"
sort_sensitive = true
sort_dir_first = true

